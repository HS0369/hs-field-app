<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body <div class="header">
  <img src="https://drive.google.com/uc?export=view&id=1xNX35oNoa9O54b28QnyvgEcdXWHTkhue" class="logo">
  <h2>HS Field App</h2>
  <span class="help" onclick="showHelp()">❓</span>
</div>
  {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  background: #2ecc71;
  color: #fff;
}

.logo {
  width: 50px;
}

/* LOGIN BOX */
.login-box {
  max-width: 320px;
  margin: 50px auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  text-align: center;
}

/* CARD LIST */
.card {
  background: #fff;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* INPUT + BUTTON */
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  box-sizing: border-box;
}
.action-btn {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
  font-size: 14px;
}

.row-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
  .call-btn {
  position: absolute;
  right: 15px;
  top: 15px;
  text-decoration: none;
  font-size: 20px;
}
.card {
  position: relative;
}
  .help {
  position: absolute;
  right: 15px;
  top: 15px;
  font-size: 20px;
  cursor: pointer;
}
.header {
  position: relative;
}
</style>
</head>

<body>

<h2>HS Field App</h2>

<div id="login" class="login-box">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Patients</h3>
  <div id="list"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

// LOGIN
function login() {

  var mobile = document.getElementById("mobile").value;

  fetch(API_URL + "?mobile=" + mobile)
  .then(res => res.text())
  .then(data => {
    console.log(data);

    var json = JSON.parse(data);

    if (json.length > 0) {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      render(json);
    } else {
      alert("No data");
    }
  })
  .catch(err => {
    console.log(err);
    alert("Error loading data");
  });
}
  function showHelp(){
  alert("Help section coming soon");
}
// RENDER
function render(data) {

  let html = "";

  data.forEach((row, index) => {

    let date = row[1];
let name = row[3];
let time = formatTime(row[2]);
let tube = row[7];
    let phone = row[9];

    html += `
<div class="card">
  <div><b>${date}</b></div>
  <div>${name}</div>
  <div>${time}</div>
  <div>Tube: ${tube}</div>
  <a href="tel:${phone}" class="call-btn">📞</a>
</div>
`;
  });

  window.fullData = data;
  document.getElementById("list").innerHTML = html;
}
</script>
  <div id="detail" style="display:none;">
  <h3>Patient Details</h3>

  <div id="detailData"></div>

  <input id="payAmount" placeholder="Enter Payment">
  <button onclick="savePayment()">Save Payment</button>

  <br><br>

  <input type="file" id="photoFile">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <br><br>
  <button onclick="goBack()">Back</button>
</div>
<script>
  function openDetail(index){

  let row = window.fullData[index];
  window.currentRowIndex = index;

  document.getElementById("app").style.display = "none";
  document.getElementById("detail").style.display = "block";

  document.getElementById("detailData").innerHTML = `
    <div class="card">
      <b>${row[1]}</b><br><br>
       Time: ${formatTime(row[2])}<br>
       Name: ${row[3]}<br>
       Address: ${row[5]}<br>
       Tube: ${row[7]}<br>
       Amount: ₹${row[8]}
      <div class="row-btns">
  <button class="action-btn">Payment</button>
  <button class="action-btn">Save</button>
  <button class="action-btn">Upload</button>
  <button class="action-btn" onclick="goBack()">Back</button>
</div>
    </div>
  `;
}
  function formatTime(dateStr){

  let d = new Date(dateStr);

  let hours = d.getHours();
  let minutes = d.getMinutes();

  let ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;

  minutes = minutes < 10 ? '0'+minutes : minutes;

  return hours + ':' + minutes + ' ' + ampm;
}
function goBack(){
  document.getElementById("detail").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function savePayment(){
  var amount = document.getElementById("payAmount").value;
  var rowIndex = window.currentRowIndex + 2;

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "payment",
      row: rowIndex,
      amount: amount
    })
  })
  .then(res => res.text())
  .then(r=>{
    if(r=="success") alert("Saved");
    else alert("Failed");
  });
}

function uploadPhoto(){
  var file = document.getElementById("photoFile").files[0];
  var reader = new FileReader();

  reader.onload = function(){
    var base64 = reader.result.split(",")[1];
    var rowIndex = window.currentRowIndex + 2;

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "upload",
        row: rowIndex,
        file: base64
      })
    })
    .then(res => res.text())
    .then(r=>{
      if(r=="success") alert("Uploaded");
      else alert("Failed");
    });
  };

  reader.readAsDataURL(file);
}
</script>
</body>
</html>
