<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #00b894, #00cec9);
  color: white;
}

button {
  background: #00b894;
  color: white;
  border: none;
  font-weight: bold;
}

button:hover {
  background: #019875;
}

.card {
  border-left: 5px solid #00b894;
} 
.call-btn {
  position: absolute;
  right: 15px;
  top: 15px;
  text-decoration: none;
  font-size: 20px;
}

/* INPUT + BUTTON */
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  box-sizing: border-box;
}

.row-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.action-btn {
  padding: 8px;
}
  .help {
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <h2>HS Field App</h2>
  <span class="help" onclick="showHelp()">⋮</span>
</div>

<!-- LOGIN -->
<div id="login" class="login-box">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<!-- LIST -->
<div id="app" style="display:none;">
  <h3 style="text-align:center;">Patients</h3>
  <div id="list"></div>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none;">
  <h3 style="text-align:center;">Patient Details</h3>

  <div id="detailData"></div>

  <input id="payAmount" placeholder="Enter Payment">
  <button onclick="savePayment()">Save Payment</button>

  <input type="file" id="photoFile">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <button onclick="goBack()">Back</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

// LOGIN
function login() {

  var mobile = document.getElementById("mobile").value;

  fetch(API_URL + "?mobile=" + mobile)
  .then(res => res.text())
  .then(data => {

    var json = JSON.parse(data);

    if (json.length > 0) {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      render(json);
    } else {
      alert("No data");
    }

  })
  .catch(err => {
    console.log(err);
    alert("Error loading data");
  });
}

// HELP
function showHelp(){
  alert("Help section coming soon");
}

// RENDER LIST
function render(data) {

  let html = "";

  data.forEach((row, index) => {

    let date = row[1];
    let name = row[3];
    let time = formatTime(row[2]);
    let tube = row[7];
    let phone = row[9];

    html += `
    <div class="card" onclick="openDetail(${index})">
      <div><b>${date}</b></div>
      <div>${name}</div>
      <div>${time}</div>
      <div>Tube: ${tube}</div>

      <a href="tel:${phone}" class="call-btn" onclick="event.stopPropagation()">📞</a>
    </div>
    `;
  });

  window.fullData = data;
  document.getElementById("list").innerHTML = html;
}

// DETAIL
function openDetail(index){

  let row = window.fullData[index];
  window.currentRowIndex = index;

  document.getElementById("app").style.display = "none";
  document.getElementById("detail").style.display = "block";

  document.getElementById("detailData").innerHTML = `
    <div class="card">
      <b>${row[3]}</b><br><br>
      Time: ${formatTime(row[2])}<br>
      Address: ${row[5]}<br>
      Tube: ${row[7]}<br>
      Amount: ₹${row[8]}
    </div>
  `;
}

// TIME FORMAT
function formatTime(dateStr){
  let d = new Date(dateStr);
  let h = d.getHours();
  let m = d.getMinutes();

  let ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  m = m < 10 ? '0'+m : m;

  return h + ':' + m + ' ' + ampm;
}

// BACK
function goBack(){
  document.getElementById("detail").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// PAYMENT
function savePayment(){
  var amount = document.getElementById("payAmount").value;
  var rowIndex = window.currentRowIndex + 2;

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "payment",
      row: rowIndex,
      amount: amount
    })
  })
  .then(res => res.text())
  .then(r=>{
    alert(r=="success" ? "Saved" : "Failed");
  });
}

// PHOTO
function uploadPhoto(){
  var file = document.getElementById("photoFile").files[0];
  var reader = new FileReader();

  reader.onload = function(){
    var base64 = reader.result.split(",")[1];
    var rowIndex = window.currentRowIndex + 2;

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "upload",
        row: rowIndex,
        file: base64
      })
    })
    .then(res => res.text())
    .then(r=>{
      alert(r=="success" ? "Uploaded" : "Failed");
    });
  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
