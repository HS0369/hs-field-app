<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:#fff;}
.login{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
input,button{width:90%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;}
button{background:#1976d2;color:#fff;font-weight:bold;}
.header{display:flex;align-items:center;padding:10px;border-bottom:1px solid #ddd;}
.header img{width:50px;height:50px;border-radius:50%;margin-right:10px;}
.menu{margin:10px;padding:15px;border:1px solid #ddd;border-radius:10px;text-align:center;font-weight:bold;}
.card{border:1px solid #eee;margin:10px;padding:10px;border-radius:8px;}
video{width:100%;max-height:200px;}
</style>
</head>

<body>

<div id="login" class="login">
  <b>Health Space</b>
  <input id="mobile" placeholder="Mobile">
  <input id="password" type="password" placeholder="Password">
  <button onclick="startCamera()">Login</button>
</div>

<div id="cameraBox" style="display:none;text-align:center">
  <video id="video" autoplay></video><br>
  <button onclick="capturePhoto()">Capture</button>
</div>

<canvas id="canvas" style="display:none"></canvas>

<div id="dashboard" style="display:none">
  <div class="header">
    <img id="userPhoto">
    <div>
      <b id="userName"></b>
    </div>
  </div>

  <div class="menu">Total ₹<span id="total">0</span></div>

  <div class="menu" onclick="openPatients()">Patients</div>
  <div class="menu" onclick="openCollected()">Collected</div>
  <div class="menu" onclick="logout()">Logout</div>
</div>

<div id="patients" style="display:none">
  <h3>Patients</h3>
  <div id="list"></div>
</div>

<div id="collected" style="display:none">
  <h3>Collected</h3>
  <div id="collectedList"></div>
</div>

<div id="detail" style="display:none">
  <div id="detailBox"></div>

  <input id="pay" placeholder="Enter Amount">
  <button onclick="payNow()">Submit</button>

  <input type="file" id="photo" accept="image/*" capture="environment">
  <button onclick="uploadPhoto()">Upload Tubes Photo</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

let patients=[];
let collected=[];
let currentRow=null;
let paymentDone=false;

// FORMAT FIX
function formatDate(d){
let x=new Date(d);
return x.toLocaleDateString("en-GB");
}

function formatTime(d){
let x=new Date(d);
return x.toLocaleTimeString("en-US");
}

// AUTO LOGIN
window.onload=function(){
let t=localStorage.getItem("loginTime");
let m=localStorage.getItem("mobile");

if(t && m && (Date.now()-t)<12*60*60*1000){
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
document.getElementById("userName").innerText=localStorage.getItem("name");
document.getElementById("userPhoto").src=localStorage.getItem("photo");
fetchData();
}
};

// CAMERA
function startCamera(){
document.getElementById("login").style.display="none";
document.getElementById("cameraBox").style.display="block";

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("video").srcObject=stream;
});
}

// CAPTURE
function capturePhoto(){
let v=document.getElementById("video");
let c=document.getElementById("canvas");

c.width=v.videoWidth;
c.height=v.videoHeight;
c.getContext("2d").drawImage(v,0,0);

localStorage.setItem("photo",c.toDataURL());

login();
}

// LOGIN
function login(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("password").value;

if(p!="12345"){alert("Wrong password");return;}

localStorage.setItem("mobile",m);
localStorage.setItem("loginTime",Date.now());

fetchData();
}

// FETCH
function fetchData(){

let m=localStorage.getItem("mobile");

fetch(API+"?mobile="+m)
.then(r=>r.json())
.then(data=>{

patients=[];
collected=[];

data.forEach(obj=>{
let r=obj.data;

if(r[10]=="Collected"){
collected.push({row:obj.row,data:r});
}else{
patients.push({row:obj.row,data:r});
}
});

if(patients.length){
localStorage.setItem("name",patients[0].data[3]);
document.getElementById("userName").innerText=patients[0].data[3];
}

document.getElementById("userPhoto").src=localStorage.getItem("photo");

render();
renderCollected();
updateTotal();

});
}

// RENDER
function render(){

let html="";

patients.forEach((p,i)=>{
let r=p.data;

html+=`
<div class="card" onclick="openDetail(${i})">
<b>${r[3]}</b><br>
📅 ${formatDate(r[1])}<br>
🕒 ${formatTime(r[2])}<br>
🧪 ${r[7]}<br>
₹${r[8]}<br>
📍 ${r[5]}<br>
<a href="tel:${r[4]}" onclick="event.stopPropagation()">📞</a>
<a href="https://maps.google.com?q=${encodeURIComponent(r[5])}" target="_blank" onclick="event.stopPropagation()">📍</a>
</div>`;
});

document.getElementById("list").innerHTML=html;
}

// DETAIL
function openDetail(i){
currentRow=i;
let r=patients[i].data;

hide();
document.getElementById("detail").style.display="block";

document.getElementById("detailBox").innerHTML=`
<b>${r[3]}</b><br>
₹${r[8]}
`;
}

// PAYMENT
function payNow(){

let amt=Number(document.getElementById("pay").value);
let total=Number(patients[currentRow].data[8]);

if(amt!==total){alert("Full payment required");return;}

paymentDone=true;

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"payment",
row:patients[currentRow].row
})
});

alert("Upload Photo");
}

// PHOTO
function uploadPhoto(){

if(!paymentDone){alert("Pay first");return;}

let file=document.getElementById("photo").files[0];
let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"upload",
row:patients[currentRow].row,
file:base64
})
}).then(()=>{

fetchData();
hide();
document.getElementById("patients").style.display="block";

});
};

reader.readAsDataURL(file);
}

// COLLECTED
function renderCollected(){

let html="";

collected.forEach(p=>{
let r=p.data;

html+=`
<div class="card">
<b>${r[3]}</b><br>
🧪 ${r[7]}<br>
₹${r[8]}
</div>`;
});

document.getElementById("collectedList").innerHTML=html;
}

// TOTAL
function updateTotal(){
let t=0;
collected.forEach(p=>t+=Number(p.data[8]||0));
document.getElementById("total").innerText=t;
}

// NAV
function openPatients(){hide();document.getElementById("patients").style.display="block";}
function openCollected(){hide();document.getElementById("collected").style.display="block";}
function hide(){["dashboard","patients","collected","detail","cameraBox"].forEach(id=>{let el=document.getElementById(id);if(el)el.style.display="none";});}
function logout(){localStorage.clear();location.reload();}

</script>

</body>
</html>
