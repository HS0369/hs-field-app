<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#fff;}

.login{
height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
}

input,button{
width:90%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;
}

button{background:#1976d2;color:#fff;font-weight:bold;}

.header{
display:flex;align-items:center;padding:10px;border-bottom:1px solid #ddd;
}

.header img{
width:50px;height:50px;border-radius:50%;margin-right:10px;
}

.menu{
margin:10px;padding:15px;border:1px solid #ddd;border-radius:10px;text-align:center;font-weight:bold;
}

.card{
border:1px solid #eee;margin:10px;padding:10px;border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <img src="logo.png" width="80"><br>
  <b>Health Space</b>

  <input id="mobile" placeholder="Mobile">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

  <div class="header">
    <img id="userPhoto">
    <div>
      <b id="userName"></b><br>
      <small>Phlebotomist</small>
    </div>
  </div>

  <div class="menu">Today Collection: ₹<span id="todayTotal">0</span></div>

  <div class="menu" onclick="openPatients()">Patients</div>
  <div class="menu" onclick="openCollected()">Collected</div>
  <div class="menu" onclick="logout()">Logout</div>

</div>

<!-- PATIENTS -->
<div id="patients" style="display:none">
  <h3 style="text-align:center">Patients</h3>
  <div id="list"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- COLLECTED -->
<div id="collected" style="display:none">
  <h3 style="text-align:center">Collected</h3>
  <div id="collectedList"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none">
  <h3 style="text-align:center">Details</h3>

  <div id="detailBox"></div>

  <input id="pay" placeholder="Enter Amount">
  <button onclick="checkPayment()">Submit Payment</button>

  <input type="file" id="photo">
  <button onclick="upload()">Upload Photo</button>

  <button onclick="backPatients()">Back</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

let patients=[];
let collected=[];
let currentIndex=null;
let paymentDone=false;

// AUTO LOGIN (12 HOURS)
window.onload=function(){

let time=localStorage.getItem("loginTime");

if(time){
let diff=(Date.now()-time)/(1000*60*60);

if(diff<12){

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("userName").innerText=localStorage.getItem("name");
document.getElementById("userPhoto").src=localStorage.getItem("photo");

fetchData();

}else{
localStorage.clear();
}
}
};

// LOGIN
function login(){

let mob=document.getElementById("mobile").value;
let pass=document.getElementById("password").value;

if(pass!="12345"){
alert("Wrong password");
return;
}

localStorage.setItem("loginTime",Date.now());

fetch(API+"?mobile="+mob)
.then(r=>r.text())
.then(t=>{

let data=JSON.parse(t);

patients=data;

localStorage.setItem("name",data[0][6]);

document.getElementById("userName").innerText=data[0][6];

// default avatar
let img="https://via.placeholder.com/50";
localStorage.setItem("photo",img);
document.getElementById("userPhoto").src=img;

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

renderPatients();
updateTotal();

});

}

// FETCH AGAIN (AUTO LOGIN)
function fetchData(){
fetch(API)
.then(r=>r.text())
.then(t=>{
patients=JSON.parse(t);
renderPatients();
updateTotal();
});
}

// RENDER
function renderPatients(){

let html="";

patients.forEach((r,i)=>{
html+=`<div class="card" onclick="openDetail(${i})">
📅 ${formatDate(r[1])}<br>
🧪 ${r[7]}<br>
₹${r[8]}
</div>`;
});

document.getElementById("list").innerHTML=html;
}

// DETAIL
function openDetail(i){

currentIndex=i;
paymentDone=false;

let r=patients[i];

hide();
document.getElementById("detail").style.display="block";

document.getElementById("detailBox").innerHTML=`
<div class="card">
📅 ${formatDate(r[1])}<br>
🧪 ${r[7]}<br>
Total ₹${r[8]}
</div>`;
}

// PAYMENT CHECK
function checkPayment(){

let amt=Number(document.getElementById("pay").value);
let total=Number(patients[currentIndex][8]);

if(amt!==total){
alert("Full payment required");
return;
}

paymentDone=true;
alert("Now upload photo");

}

// UPLOAD
function upload(){

if(!paymentDone){
alert("Complete payment first");
return;
}

let file=document.getElementById("photo").files[0];
if(!file){alert("Select photo");return;}

let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"upload",
file:base64
})
})
.then(r=>r.text())
.then(url=>{

let rData=patients[currentIndex];
collected.push(rData);

// remove patient
patients.splice(currentIndex,1);

updateTotal();
backPatients();

});

};

reader.readAsDataURL(file);
}

// TOTAL
function updateTotal(){

let sum=0;

collected.forEach(r=>{
sum+=Number(r[8]);
});

document.getElementById("todayTotal").innerText=sum;
}

// NAV
function openPatients(){hide();document.getElementById("patients").style.display="block";}
function openCollected(){

hide();

let html="";
collected.forEach(r=>{
html+=`<div class="card">${r[7]} ₹${r[8]}</div>`;
});

document.getElementById("collectedList").innerHTML=html;
document.getElementById("collected").style.display="block";
}

function goDash(){hide();document.getElementById("dashboard").style.display="block";}
function backPatients(){hide();renderPatients();document.getElementById("patients").style.display="block";}

function hide(){
["dashboard","patients","collected","detail"].forEach(id=>{
document.getElementById(id).style.display="none";
});
}

// DATE
function formatDate(d){
let x=new Date(d);
return x.getDate()+"-"+(x.getMonth()+1)+"-"+x.getFullYear();
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
