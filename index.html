<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:#fff;}
.login{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
input,button{width:90%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;}
button{background:#1976d2;color:#fff;font-weight:bold;}
.header{display:flex;align-items:center;padding:10px;border-bottom:1px solid #ddd;}
.header img{width:50px;height:50px;border-radius:50%;margin-right:10px;}
.menu{margin:10px;padding:15px;border:1px solid #ddd;border-radius:10px;text-align:center;font-weight:bold;}
.card{border:1px solid #eee;margin:10px;padding:10px;border-radius:8px;}
video{width:100%;max-height:200px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <img src="logo.png" width="80"><br>
  <b>Health Space</b>

  <input id="mobile" placeholder="Mobile">
  <input id="password" type="password" placeholder="Password">

  <button onclick="startCamera()">Login</button>
</div>

<!-- CAMERA -->
<div id="cameraBox" style="display:none;text-align:center">
  <video id="video" autoplay></video><br>
  <button onclick="capturePhoto()">📸 Capture Photo</button>
</div>

<canvas id="canvas" style="display:none"></canvas>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="header">
    <img id="userPhoto">
    <div>
      <b id="userName"></b><br>
      <small>Phlebotomist</small>
    </div>
  </div>

  <div class="menu" onclick="openPatients()">Patients</div>
  <div class="menu" onclick="openCollected()">Collected</div>
  <div class="menu" onclick="logout()">Logout</div>
</div>

<!-- PATIENTS -->
<div id="patients" style="display:none">
  <h3 style="text-align:center">Patients</h3>
  <div id="list"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- COLLECTED -->
<div id="collected" style="display:none">
  <h3 style="text-align:center">Collected</h3>
  <div id="collectedList"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none">
  <h3 style="text-align:center">Details</h3>

  <div id="detailBox"></div>

  <input id="pay" placeholder="Enter Amount">
  <button onclick="payNow()">Submit Payment</button>

  <input type="file" id="photo">
  <button onclick="uploadPhoto()">Upload Tubes Photo</button>

  <button onclick="backPatients()">Back</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

let patients=[];
let collected = [];
let currentRow=null;
let paymentDone=false;

// DATE
function formatDate(d){
let dt=new Date(d);
return ("0"+dt.getDate()).slice(-2)+"-"+("0"+(dt.getMonth()+1)).slice(-2)+"-"+dt.getFullYear();
}

// TIME
function formatTime(d){
let dt=new Date(d);
let h=dt.getHours();
let m=dt.getMinutes();
let ampm=h>=12?"PM":"AM";
h=h%12||12;
m=m<10?"0"+m:m;
return h+":"+m+" "+ampm;
}

// AUTO LOGIN
window.onload=function(){
let t=localStorage.getItem("loginTime");
let m=localStorage.getItem("mobile");

if(t && m && (Date.now()-t)/(1000*60*60)<12){
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
document.getElementById("userName").innerText=localStorage.getItem("name")||"User";
document.getElementById("userPhoto").src=localStorage.getItem("photo");
fetchData();
}
};

// CAMERA START
function startCamera(){
document.getElementById("login").style.display="none";
document.getElementById("cameraBox").style.display="block";

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("video").srcObject=stream;
});
}

// CAPTURE
function capturePhoto(){
let video=document.getElementById("video");
let canvas=document.getElementById("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

let photo=canvas.toDataURL("image/png");
localStorage.setItem("photo",photo);

login();
}

// LOGIN
function login(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("password").value;

if(p!="12345"){alert("Wrong password");return;}

localStorage.setItem("mobile",m);
localStorage.setItem("loginTime",Date.now());

fetch(API+"?mobile="+m)
.then(r=>r.text())
.then(t=>{

if(t.includes("<!DOCTYPE")){alert("API Error");return;}

let data = JSON.parse(t);

patients = data.filter(r => r[10] != "Collected");
collected = data.filter(r => r[10] == "Collected");

render();

// remove already collected
patients = patients.filter(p => !collected.find(c => c.id==p[0]));

let name=patients[0][6]||"User";
localStorage.setItem("name",name);

document.getElementById("userName").innerText=name;
document.getElementById("userPhoto").src=localStorage.getItem("photo");

document.getElementById("cameraBox").style.display="none";
document.getElementById("dashboard").style.display="block";

render();

});
}

// FETCH
function fetchData(){
let m=localStorage.getItem("mobile");

fetch(API+"?mobile="+m)
.then(r=>r.text())
.then(t=>{
if(!t)return;

patients=JSON.parse(t);

// remove collected
patients = patients.filter(p => !collected.find(c => c.id==p[0]));

render();
});
}

// RENDER
function render(){
let html="";

patients.forEach((r,i)=>{
html+=`
<div class="card" onclick="openDetail(${i})">
<b>${r[3]}</b><br>
📅 ${formatDate(r[1])}<br>
🕒 ${formatTime(r[2])}<br>
🧪 ${r[7]}<br>
₹${r[8]}
</div>`;
});

document.getElementById("list").innerHTML=html;
}

// DETAIL
function openDetail(i){
currentRow=i;
let r=patients[i];

hide();
document.getElementById("detail").style.display="block";

document.getElementById("detailBox").innerHTML=`
<div class="card">
<b>${r[3]}</b><br>
🧪 ${r[7]}<br>
Total ₹${r[8]}
</div>`;
}

// PAYMENT
function payNow(){
let amt=Number(document.getElementById("pay").value);
let total=Number(patients[currentRow][8]);

if(amt!==total){alert("Full payment required");return;}

paymentDone=true;

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"payment",
row:currentRow+2
})
});

alert("Now upload tube photo");
}

// PHOTO
function uploadPhoto(){

if(!paymentDone){alert("Pay first");return;}

let file=document.getElementById("photo").files[0];
let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"upload",
row:currentRow+2,
file:base64
})
}).then(()=>{

let p=patients[currentRow];

// save collected
collected.push({
id:p[0],
name:p[3],
amount:p[8],
tube:p[7]
});

localStorage.setItem("collected",JSON.stringify(collected));

// remove from list
patients.splice(currentRow,1);

backPatients();

});
};

reader.readAsDataURL(file);
}

// COLLECTED VIEW
function openCollected(){

hide();

let html="";

collected.forEach(r=>{
html+=`
<div class="card">
<b>${r[3]}</b><br>
🧪 ${r[7]}<br>
₹${r[8]}
</div>`;
});

document.getElementById("collectedList").innerHTML=html;
document.getElementById("collected").style.display="block";
}
// NAV
function openPatients(){hide();document.getElementById("patients").style.display="block";}
function goDash(){hide();document.getElementById("dashboard").style.display="block";}
function backPatients(){hide();render();document.getElementById("patients").style.display="block";}
function hide(){
["dashboard","patients","collected","detail","cameraBox"].forEach(id=>{
let el=document.getElementById(id);
if(el) el.style.display="none";
});
}

function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
