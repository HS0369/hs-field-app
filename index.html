<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#fff;}
input,button{width:90%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;}
button{background:#1976d2;color:#fff;font-weight:bold;}
.card{border:1px solid #eee;margin:10px;padding:10px;border-radius:8px;}
.menu{margin:10px;padding:15px;border:1px solid #ddd;border-radius:10px;text-align:center;font-weight:bold;}
.header{display:flex;align-items:center;padding:10px;border-bottom:1px solid #ddd;}
.header img{width:50px;height:50px;border-radius:50%;margin-right:10px;}
video{width:90%;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" style="padding:20px;text-align:center">
  <img src="logo.png" width="80"><br>
  <b>Health Space</b>
  <input id="mobile" placeholder="Mobile">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="header">
    <img id="userPhoto">
    <div><b id="userName"></b><br><small>Phlebotomist</small></div>
  </div>

  <div class="menu" onclick="openPatients()">Patients</div>
  <div class="menu" onclick="openCollected()">Collected</div>
  <div class="menu" onclick="logout()">Logout</div>
</div>

<!-- PATIENTS -->
<div id="patients" style="display:none">
  <h3 style="text-align:center">Patients</h3>
  <div id="list"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- COLLECTED -->
<div id="collected" style="display:none">
  <h3 style="text-align:center">Collected</h3>
  <div id="collectedList"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none">
  <h3 style="text-align:center">Details</h3>
  <div id="detailBox"></div>

  <input id="pay" placeholder="Enter Amount">
  <button onclick="payNow()">Submit Payment</button>

  <input type="file" id="photo">
  <button onclick="uploadPhoto()">Upload Tubes Photo</button>

  <video id="video" autoplay style="display:none"></video>
  <button onclick="startCamera()">Open Camera</button>
  <button onclick="capturePhoto()">Capture Photo</button>

  <button onclick="backPatients()">Back</button>
</div>

<script>

const API="PASTE_YOUR_SCRIPT_URL";

let patients=[];
let collected=JSON.parse(localStorage.getItem("collected")||"[]");
let currentRow=null;
let paymentDone=false;

// LOGIN
function login(){
let m=mobile.value;
let p=password.value;

if(p!="12345"){alert("Wrong password");return;}

localStorage.setItem("mobile",m);
localStorage.setItem("loginTime",Date.now());

fetch(API+"?mobile="+m)
.then(r=>r.text())
.then(t=>{
patients=JSON.parse(t);

let name=patients[0][6]||"User";
userName.innerText=name;
localStorage.setItem("name",name);

userPhoto.src=localStorage.getItem("photo")||"https://via.placeholder.com/50";

login.style.display="none";
dashboard.style.display="block";

render();
});
}

// FETCH
function fetchData(){
let m=localStorage.getItem("mobile");
fetch(API+"?mobile="+m)
.then(r=>r.text())
.then(t=>{
patients=JSON.parse(t);
render();
});
}

// RENDER
function render(){
let html="";
patients.forEach((r,i)=>{
html+=`
<div class="card" onclick="openDetail(${i})">
<b>${r[3]}</b><br>
🧪 ${r[7]}<br>
₹${r[8]}
</div>`;
});
list.innerHTML=html;
}

// DETAIL
function openDetail(i){
currentRow=i+2;
let r=patients[i];

hide();
detail.style.display="block";

detailBox.innerHTML=`
<div class="card">
<b>${r[3]}</b><br>
🧪 ${r[7]}<br>
Total ₹${r[8]}
</div>`;
}

// PAYMENT
function payNow(){
let amt=Number(pay.value);
let total=Number(patients[currentRow-2][8]);

if(amt!==total){alert("Full payment required");return;}

paymentDone=true;

fetch(API,{
method:"POST",
body:new URLSearchParams({action:"payment",row:currentRow})
}).then(()=>fetchData());

alert("Now upload tubes photo");
}

// PHOTO
function uploadPhoto(){

if(!paymentDone){alert("Complete payment first");return;}

let file=photo.files[0];
let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"upload",
row:currentRow,
file:base64
})
}).then(()=>{

let r=patients[currentRow-2];

collected.push({
name:r[3],
amount:r[8],
tube:r[7]
});

localStorage.setItem("collected",JSON.stringify(collected));

patients.splice(currentRow-2,1);

fetchData();
backPatients();

});
};

reader.readAsDataURL(file);
}

// CAMERA
function startCamera(){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
video.style.display="block";
});
}

function capturePhoto(){
let canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

let photo=canvas.toDataURL("image/png");
localStorage.setItem("photo",photo);
userPhoto.src=photo;

alert("Photo captured");
}

// COLLECTED VIEW
function openCollected(){

hide();

let html="";

collected.forEach(r=>{
html+=`
<div class="card">
<b>${r.name}</b><br>
🧪 ${r.tube}<br>
₹${r.amount}
</div>`;
});

collectedList.innerHTML=html;
collected.style.display="block";
}

// NAV
function openPatients(){hide();patients.style.display="block";}
function goDash(){hide();dashboard.style.display="block";}
function backPatients(){hide();patients.style.display="block";}
function hide(){
["dashboard","patients","collected","detail"].forEach(id=>{
document.getElementById(id).style.display="none";
});
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
