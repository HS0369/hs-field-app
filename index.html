<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body { font-family: Arial; padding: 10px; }
.box { background: #fff; padding: 10px; margin: 10px 0; border-radius: 8px; }
input { padding: 8px; width: 100%; margin: 5px 0; }
button { padding: 8px; background: green; color: #fff; border: none; }
img { width: 100px; margin-top: 5px; }
</style>
</head>

<body>

<h2>HS Field App</h2>

<div id="login">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Patients</h3>
  <div id="list"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxPhibtGN39HcWIZaLIwGS3h9X6qLkVlDr9qTQ4QJIljcQ3IAEeMWCRlZS9x2apiPc/exec";

// LOGIN
function login() {

  var mobile = document.getElementById("mobile").value;

  fetch(API_URL + "?mobile=" + mobile)
  .then(res => res.json())
  .then(res => {
  console.log("STATUS:", res.status);
  return res.text();
})
.then(data => {
  console.log("RAW DATA:", data);

    if (data.length > 0) {

      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";

      render(data);

    } else {
      alert("No data found");
    }

  })
  .catch(err => {
  console.log("FULL ERROR:", err);
  alert("Error loading data");
});
}


// RENDER
function render(data) {

  var html = "";

  data.forEach(function(row){

    html += `
  <div class="box">
    <b>${row[1]}</b><br>
    Time: ${row[2]}<br>
    Amount: ₹${row[8]}<br>

    <input id="pay_${i}" placeholder="Enter Amount">
    <button onclick="savePayment(${row[0]})">Save Payment</button>
  </div>
`;
  });

  document.getElementById("list").innerHTML = html;
}
function savePayment(row){

  var amount = document.getElementById("pay_"+row).value;

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "payment",
      row: row,
      amount: amount
    })
  })
  .then(res => res.text())
  .then(r=>{
    if(r=="success"){
      alert("Payment Saved");
    } else {
      alert("Failed");
    }
  });
}
</script>

</body>
</html>
