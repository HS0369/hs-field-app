<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body { font-family: Arial; padding: 10px; }
.box { background: #fff; padding: 10px; margin: 10px 0; border-radius: 8px; }
input { padding: 8px; width: 100%; margin: 5px 0; }
button { padding: 8px; background: green; color: #fff; border: none; }
img { width: 100px; margin-top: 5px; }
</style>

</head>
<body>

<div id="login">
  <h3>Login</h3>
  <input id="mobile" placeholder="Mobile">
  <input id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Patients</h3>
  <div id="list"></div>
</div>
  
  <script>
    
const API_URL = "https://script.google.com/macros/s/AKfycbxPhibtGN39HcWIZaLIwGS3h9X6qLkVlDr9qTQ4QJIljcQ3IAEeMWCRlZS9x2apiPc/exec";

// LOGIN
function login() {
  var mobile = document.getElementById("mobile").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      mobile: mobile
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log(data); // 🔥 IMPORTANT

    if (data.status === "success") {
      alert("Login success");
      showPatients(data.data);
    } else {
      alert("Invalid login or no data");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Error loading data");
  });
}
  <script>
    
// RENDER
function render(data){

  var html = "";

  data.forEach(p => {

    html += `
    <div class="box">
      <b>${p.name}</b><br>
      Amount: ₹${p.amount}<br>

      <input id="pay_${p.row}" placeholder="Enter Payment">
      <button onclick="savePayment(${p.row})">Save Payment</button><br><br>

      <input type="text" id="phone_${p.row}">
      <button onclick="uploadPhoto(${p.row})">Upload Photo</button><br>

      ${p.photo ? `<img src="${p.photo}">` : ""}
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}


// PAYMENT
function savePayment(row){

  var amount = document.getElementById("pay_"+row).value;

  fetch(API, {
    method: "POST",
    body: new URLSearchParams({
      action: "payment",
      row: row,
      amount: amount
    })
  })
  .then(res => res.text())
  .then(r=>{
    if(r=="success"){
      alert("Saved");
    } else {
      alert("Failed");
    }
  });
}


// PHOTO
function uploadPhoto(row){

  var file = document.getElementById("file_"+row).files[0];

  var reader = new FileReader();

  reader.onload = function(){

    var base64 = reader.result.split(",")[1];

    fetch(API, {
      method: "POST",
      body: new URLSearchParams({
        action: "upload",
        row: row,
        file: base64
      })
    })
    .then(res => res.text())
    .then(r=>{
      if(r=="success"){
        alert("Uploaded");
        location.reload();
      } else {
        alert("Failed");
      }
    });

  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
