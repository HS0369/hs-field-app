<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#fff;
}

/* LOGIN UI */
.login-box{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.logo{
  width:80px;
  margin-bottom:10px;
}

.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

input,button{
  width:90%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#1976d2;
  color:#fff;
  font-weight:bold;
}

/* HEADER */
.header{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

/* CARD */
.card{
  border:1px solid #eee;
  padding:12px;
  margin:10px;
  border-radius:8px;
}

/* GRID DASHBOARD */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.box{
  border:1px solid #ddd;
  padding:20px;
  text-align:center;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-box">
  <img src="logo.png" class="logo">
  <div class="title">Health Space</div>

  <input type="text" id="mobile" placeholder="Enter Mobile">

  <input type="file" id="selfie" accept="image/*" capture="user">

  <button onclick="userLogin()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <div class="header">
    Welcome, <span id="userName"></span>
  </div>

  <div class="grid">
    <div class="box" onclick="openPatients()">Orders</div>
    <div class="box" onclick="openCollected()">Collected</div>
    <div class="box">SOP</div>
    <div class="box" onclick="logout()">Logout</div>
  </div>
</div>

<!-- PATIENT LIST -->
<div id="patients" style="display:none;">
  <h3 style="text-align:center;">Patients</h3>
  <div id="list"></div>
  <button onclick="goDashboard()">Back</button>
</div>

<!-- COLLECTED -->
<div id="collected" style="display:none;">
  <h3 style="text-align:center;">Collected</h3>
  <div id="collectedList"></div>
  <button onclick="goDashboard()">Back</button>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none;">
  <h3 style="text-align:center;">Patient Details</h3>

  <div id="detailData"></div>

  <input id="payAmount" placeholder="Enter Payment">
  <button onclick="savePayment()">Save Payment</button>

  <input type="file" id="photoFile">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <button onclick="goPatients()">Back</button>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

let collectedData=[];

// LOGIN
function userLogin(){

  let mobile=document.getElementById("mobile").value;
  let file=document.getElementById("selfie").files[0];

  if(!file){
    alert("Selfie required");
    return;
  }

  localStorage.setItem("mobile",mobile);
  localStorage.setItem("loginTime",Date.now());

  fetch(API_URL+"?mobile="+mobile)
  .then(res=>res.text())
  .then(text=>{

    let data=JSON.parse(text);

    if(data.length>0){

      document.getElementById("login").style.display="none";
      document.getElementById("dashboard").style.display="block";

      document.getElementById("userName").innerText=data[0][3];

      window.fullData=data;
      render(data);

    }else{
      alert("No data");
    }

  });
}

// RENDER
function render(data){
  let html="";

  data.forEach((row,i)=>{
    html+=`
    <div class="card" onclick="openDetail(${i})">
      <b>${row[3]}</b><br>
      ${row[1]}<br>
      ${row[7]}
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
}

// NAV
function openPatients(){
  hideAll();
  document.getElementById("patients").style.display="block";
}

function openCollected(){
  hideAll();
  document.getElementById("collected").style.display="block";

  let html="";

  if(collectedData.length==0){
    html="No data";
  }else{
    collectedData.forEach(i=>{
      html+=`<div class="card">${i.name}<br>₹${i.amount}</div>`;
    });
  }

  document.getElementById("collectedList").innerHTML=html;
}

function goDashboard(){
  hideAll();
  document.getElementById("dashboard").style.display="block";
}

function goPatients(){
  hideAll();
  document.getElementById("patients").style.display="block";
}

function hideAll(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("patients").style.display="none";
  document.getElementById("collected").style.display="none";
  document.getElementById("detail").style.display="none";
}

// DETAIL
function openDetail(i){
  hideAll();
  document.getElementById("detail").style.display="block";

  let row=fullData[i];
  window.currentRowIndex=i;

  document.getElementById("detailData").innerHTML=`
  <div class="card">
    <b>${row[3]}</b><br>
    ${row[4]}<br>
    ${row[5]}<br>
    Total: ₹${row[8]}
  </div>`;
}

// SAVE
function savePayment(){
  alert("Saved. Upload photo");
}

// PHOTO
function uploadPhoto(){

  let amount=document.getElementById("payAmount").value;
  let row=fullData[currentRowIndex];

  collectedData.push({
    name:row[3],
    amount:amount
  });

  openCollected();
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
