<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #ff7a00, #d81b60);
  color: white;
  text-align: center;
  padding: 12px;
  position: relative;
}

.logo {
  width: 60px;
  height: 60px;
  object-fit: contain;
  background: #fff;
  padding: 6px;
  border-radius: 10px;
}

/* LOGIN CENTER */
.login-box {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
}

/* CARD */
.card {
  border-left: 4px solid #ff7a00;
  padding: 10px;
  margin: 10px;
  position: relative;
  background: #fff;
  border-radius: 6px;
}

/* BUTTONS */
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
}

button {
  background: #d81b60;
  color: white;
  font-weight: bold;
}

.call-btn {
  position: absolute;
  right: 10px;
  top: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo"><br>
  <b>HS Field App</b>
</div>

<!-- LOGIN -->
<div id="login" class="login-box">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<!-- LIST -->
<div id="app" style="display:none;">
  <h3 style="text-align:center;">Patients (<span id="count">0</span>)</h3>
  <div id="list"></div>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none;">
  <h3 style="text-align:center;">Patient Details</h3>

  <div id="detailData"></div>

  <input id="payAmount" placeholder="Enter Payment">
  <button onclick="savePayment()">Save Payment</button>

  <p><b>Total Paid: ₹<span id="totalPaid">0</span></b></p>

  <input type="file" id="photoFile">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <button onclick="goBack()">Back</button>
</div>

<script>

const API_URL = "YOUR_API_URL";

// ✅ AUTO LOGIN (12 HOURS)
window.onload = function(){
  let saved = localStorage.getItem("loginTime");
  let mobile = localStorage.getItem("mobile");

  if(saved && mobile){
    let diff = (Date.now() - saved) / (1000 * 60 * 60);
    if(diff < 12){
      document.getElementById("mobile").value = mobile;
      login();
    }
  }
};

// LOGIN
function login(){

  let mobile = document.getElementById("mobile").value;

  fetch(API_URL + "?mobile=" + mobile)
  .then(res => res.text())
.then(text => {
  console.log("API RESPONSE:", text);

  let data = JSON.parse(text);

    if(data.length > 0){

      localStorage.setItem("loginTime", Date.now());
      localStorage.setItem("mobile", mobile);

      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";

      render(data);

    } else {
      alert("No Data");
    }
  })
  .catch(err=>{
    alert("Loading Error");
    console.log(err);
  });
}

// RENDER
function render(data){

  let html = "";

  data.forEach((row, i)=>{

    html += `
    <div class="card" onclick="openDetail(${i})">
      <b>${row[3]}</b><br>
      📅 ${formatDate(row[1])}<br>
      🕒 ${formatTime(row[2])}<br>
      🧪 Tube: ${row[7]}
      <a href="tel:${row[4]}" class="call-btn" onclick="event.stopPropagation()">📞</a>
    </div>`;
  });

  window.fullData = data;
  document.getElementById("list").innerHTML = html;
  document.getElementById("count").innerText = data.length;
}

// DETAIL
function openDetail(i){

  let row = window.fullData[i];
  window.currentRowIndex = i;

  document.getElementById("app").style.display = "none";
  document.getElementById("detail").style.display = "block";

  let total = row[8] || 0;

  document.getElementById("totalPaid").innerText = total;

  document.getElementById("detailData").innerHTML = `
  <div class="card">
    <b>${row[3]}</b><br><br>
    📅 ${formatDate(row[1])}<br>
    🕒 ${formatTime(row[2])}<br>
    📍 ${row[5]}<br>
    🧪 Tube: ${row[7]}<br>
    💰 Total: ₹${total}
  </div>`;
}

// DATE FIX
function formatDate(val){

  if(!val) return "";

  let d = new Date(val);

  if(isNaN(d)){
    let parts = val.split("-");
    return parts.reverse().join("-");
  }

  return ("0"+d.getDate()).slice(-2) + "-" +
         ("0"+(d.getMonth()+1)).slice(-2) + "-" +
         d.getFullYear();
}

// TIME FIX
function formatTime(val){

  let d = new Date(val);

  if(isNaN(d)) return "";

  let h = d.getHours();
  let m = d.getMinutes();

  let ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  m = m < 10 ? "0"+m : m;

  return h+":"+m+" "+ampm;
}

// BACK
function goBack(){
  document.getElementById("detail").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// PAYMENT + AUTO TOTAL
function savePayment(){

  let amount = Number(document.getElementById("payAmount").value);
  let rowIndex = window.currentRowIndex + 2;

  let currentTotal = Number(document.getElementById("totalPaid").innerText);

  let newTotal = currentTotal + amount;

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "payment",
      row: rowIndex,
      amount: newTotal
    })
  })
  .then(res=>res.text())
  .then(r=>{
    if(r=="success"){
      document.getElementById("totalPaid").innerText = newTotal;
      alert("Saved");
    } else {
      alert("Failed");
    }
  });
}

// PHOTO
function uploadPhoto(){

  let file = document.getElementById("photoFile").files[0];
  let reader = new FileReader();

  reader.onload = function(){

    let base64 = reader.result.split(",")[1];
    let rowIndex = window.currentRowIndex + 2;

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "upload",
        row: rowIndex,
        file: base64
      })
    })
    .then(res=>res.text())
    .then(r=>{
      alert(r=="success" ? "Uploaded" : "Failed");
    });
  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
