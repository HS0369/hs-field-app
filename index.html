<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body { font-family: Arial; padding: 10px; }
.box { background: #fff; padding: 10px; margin: 10px 0; border-radius: 8px; }
input { padding: 8px; width: 100%; margin: 5px 0; }
button { padding: 8px; background: green; color: #fff; border: none; }
img { width: 100px; margin-top: 5px; }
</style>
</head>

<body>

<h2>HS Field App</h2>

<div id="login">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Patients</h3>
  <div id="list"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

// LOGIN
function login() {

  var mobile = document.getElementById("mobile").value;

  fetch(API_URL + "?mobile=" + mobile)
  .then(res => res.text())
  .then(data => {
    console.log(data);

    var json = JSON.parse(data);

    if (json.length > 0) {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      render(json);
    } else {
      alert("No data");
    }
  })
  .catch(err => {
    console.log(err);
    alert("Error loading data");
  });
}
  
// RENDER
function render(data) {

  var html = "";

  data.forEach(function(row, index){

    html += `
      <div class="box" onclick="openDetail(${index})">
        <b>${row[1]}</b><br>
        Date: ${row[0]}<br>
        Amount: ₹${row[8]}
      </div>
    `;
  });

  window.fullData = data; // 🔥 store globally

  document.getElementById("list").innerHTML = html;
} 
</script>
  <div id="detail" style="display:none;">
  <h3>Patient Details</h3>

  <div id="detailData"></div>

  <input id="payAmount" placeholder="Enter Payment">
  <button onclick="savePayment()">Save Payment</button>

  <br><br>

  <input type="file" id="photoFile">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <br><br>
  <button onclick="goBack()">Back</button>
</div>
<script>
  function openDetail(index){
  var row = window.fullData[index];
  window.currentRowIndex = index;

  document.getElementById("app").style.display = "none";
  document.getElementById("detail").style.display = "block";

  document.getElementById("detailData").innerHTML = `
    <b>${row[1]}</b><br>
    Date: ${row[0]}<br>
    Time: ${row[2]}<br>
    Address: ${row[3]}<br>
    Test: ${row[4]}<br>
    Amount: ₹${row[8]}
  `;
}

function goBack(){
  document.getElementById("detail").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function savePayment(){
  var amount = document.getElementById("payAmount").value;
  var rowIndex = window.currentRowIndex + 2;

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "payment",
      row: rowIndex,
      amount: amount
    })
  })
  .then(res => res.text())
  .then(r=>{
    if(r=="success") alert("Saved");
    else alert("Failed");
  });
}

function uploadPhoto(){
  var file = document.getElementById("photoFile").files[0];
  var reader = new FileReader();

  reader.onload = function(){
    var base64 = reader.result.split(",")[1];
    var rowIndex = window.currentRowIndex + 2;

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "upload",
        row: rowIndex,
        file: base64
      })
    })
    .then(res => res.text())
    .then(r=>{
      if(r=="success") alert("Uploaded");
      else alert("Failed");
    });
  };

  reader.readAsDataURL(file);
}
</script>
</body>
</html>
