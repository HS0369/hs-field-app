<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#fff;}

.login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input,button{
width:90%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#1976d2;
color:#fff;
font-weight:bold;
}

.header{
display:flex;
align-items:center;
padding:10px;
border-bottom:1px solid #ddd;
}

.header img{
width:50px;
height:50px;
border-radius:50%;
margin-right:10px;
}

.menu{
margin:10px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.card{
border:1px solid #eee;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <img src="logo.png" width="80"><br>
  <b>Health Space</b>

  <input id="mobile" placeholder="Mobile">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

  <div class="header">
    <img id="userPhoto">
    <div>
      <b id="userName"></b><br>
      <small>Phlebotomist</small>
    </div>
  </div>

  <div class="menu">Today Collection: ₹<span id="total">0</span></div>

  <div class="menu" onclick="openPatients()">Patients</div>
  <div class="menu" onclick="openCollected()">Collected</div>
  <div class="menu" onclick="logout()">Logout</div>

</div>

<!-- PATIENTS -->
<div id="patients" style="display:none">
  <h3 style="text-align:center">Patients</h3>
  <div id="list"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- COLLECTED -->
<div id="collected" style="display:none">
  <h3 style="text-align:center">Collected</h3>
  <div id="collectedList"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none">
  <h3 style="text-align:center">Details</h3>

  <div id="detailBox"></div>

  <input id="pay" placeholder="Enter Amount">
  <button onclick="payNow()">Submit Payment</button>

  <input type="file" id="photo">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <button onclick="backPatients()">Back</button>
</div>

<script>

const API="YOUR_SCRIPT_URL";

let patients=[];
let collected=[];
let currentRow=null;
let paymentDone=false;

// 🔐 AUTO LOGIN (12 HOURS FIXED)
window.onload=function(){

let t=localStorage.getItem("loginTime");
let m=localStorage.getItem("mobile");

if(t && m && (Date.now()-t)/(1000*60*60)<12){

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("userName").innerText=localStorage.getItem("name") || "User";
document.getElementById("userPhoto").src=localStorage.getItem("photo") || "https://via.placeholder.com/50";

// ✅ IMPORTANT: fetch again after reopen
fetchData();

}

};

// 🔐 LOGIN (FIXED)
function login(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("password").value;

if(p!="12345"){
alert("Wrong password");
return;
}

// ✅ SAVE MOBILE (CRITICAL FIX)
localStorage.setItem("mobile", m);
localStorage.setItem("loginTime",Date.now());

fetch(API+"?mobile="+m)
.then(r=>r.text())
.then(t=>{

if(!t){
alert("No data found");
return;
}

patients=JSON.parse(t);

// name from sheet column G (index 6)
let name=patients[0][6] || "User";

localStorage.setItem("name",name);

document.getElementById("userName").innerText=name;

// dummy photo (can replace later)
let img="https://via.placeholder.com/50";
localStorage.setItem("photo",img);
document.getElementById("userPhoto").src=img;

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

render();

});

}

// 🔄 FETCH DATA (FIXED)
function fetchData(){

let m=localStorage.getItem("mobile");

if(!m){
alert("Session expired");
logout();
return;
}

fetch(API+"?mobile="+m)
.then(r=>r.text())
.then(t=>{

if(!t){
console.log("Empty response");
return;
}

patients=JSON.parse(t);

render();

});

}

// 📋 RENDER PATIENTS
function render(){

let html="";

patients.forEach((r,i)=>{
html+=`
<div class="card" onclick="openDetail(${i})">
<b>${r[3]}</b><br>
📅 ${r[1]}<br>
🧪 ${r[7]}<br>
₹${r[8]}
</div>`;
});

document.getElementById("list").innerHTML=html;

}

// 🔍 DETAIL
function openDetail(i){

currentRow=i+2;

let r=patients[i];

hide();

document.getElementById("detail").style.display="block";

document.getElementById("detailBox").innerHTML=`
<div class="card">
<b>${r[3]}</b><br>
Total ₹${r[8]}
</div>`;
}

// 💰 PAYMENT
function payNow(){

let amt=Number(document.getElementById("pay").value);
let total=Number(patients[currentRow-2][8]);

if(amt!==total){
alert("Full payment required");
return;
}

paymentDone=true;

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"payment",
row:currentRow
})
});

alert("Payment done. Now upload photo");

}

// 📸 PHOTO UPLOAD
function uploadPhoto(){

if(!paymentDone){
alert("Complete payment first");
return;
}

let file=document.getElementById("photo").files[0];

let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"upload",
row:currentRow,
file:base64
})
})
.then(()=>{

// transfer to collected
collected.push(patients[currentRow-2]);

// remove from patient list
patients.splice(currentRow-2,1);

backPatients();

});

};

reader.readAsDataURL(file);
}

// 📂 NAVIGATION
function openPatients(){
hide();
document.getElementById("patients").style.display="block";
}

function openCollected(){

hide();

let html="";

collected.forEach(r=>{
html+=`<div class="card"><b>${r[3]}</b> ₹${r[8]}</div>`;
});

document.getElementById("collectedList").innerHTML=html;
document.getElementById("collected").style.display="block";

}

function goDash(){
hide();
document.getElementById("dashboard").style.display="block";
}

function backPatients(){
hide();
render();
document.getElementById("patients").style.display="block";
}

function hide(){
["dashboard","patients","collected","detail"].forEach(id=>{
document.getElementById(id).style.display="none";
});
}

// 🚪 LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
