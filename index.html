<!DOCTYPE html>
<html>
<head>
<title>HS Field App</title>

<style>
body { font-family: Arial; padding:20px; background:#f2f2f2; }
.box { background:white; padding:15px; margin:10px 0; border-radius:8px; }
button { padding:8px; background:green; color:white; border:none; margin-top:5px; }
input { padding:8px; margin:5px 0; width:200px; }
img { margin-top:10px; border-radius:6px; }
</style>

</head>

<body>

<h2>Health Space - Field App</h2>

<!-- LOGIN -->
<div id="loginDiv">
<input id="mobile" placeholder="Mobile Number"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="loginUser()">Login</button>
<p id="msg" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;"></div>

<script>

var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPhibtGN39HcWIZaLIwGS3h9X6qLkVlDr9qTQ4QJIljcQ3IAEeMWCRlZS9x2apiPc/exec";

// LOGIN
function loginUser(){
  var mobile = document.getElementById("mobile").value.trim();
  var pass = document.getElementById("pass").value;

  if(mobile=="" || pass==""){
    document.getElementById("msg").innerText="Enter details";
    return;
  }

  if(pass!="1234"){
    document.getElementById("msg").innerText="Wrong password";
    return;
  }

  localStorage.setItem("mobile", mobile);
  loadData(mobile);
}

// LOAD DATA
function loadData(mobile){

  fetch(SCRIPT_URL + "?mobile=" + mobile)
  .then(res => res.json())
  .then(data => {

    document.getElementById("loginDiv").style.display="none";

    var html = "<h3>Patients</h3>";

    if(data.length==0){
      html += "No patients";
    }

    data.forEach(d=>{

      html += `
      <div class="box">
      <b>${d.name}</b><br>
      Time: ${d.time}<br>
      Address: ${d.address}<br>
      Test: ${d.test}<br>
      Amount: ₹${d.amount}<br><br>

      <input type="file" id="photo_${d.id}"><br>
      <button onclick="uploadPhoto('${d.id}')">Upload Photo</button>
      `;

      // IMAGE DISPLAY
      if(d.photo){
        html += `<br><img src="${d.photo}" width="120">`;
      }

      html += `</div>`;
    });

    document.getElementById("app").innerHTML = html;
    document.getElementById("app").style.display="block";
  });
}

// UPLOAD PHOTO
function uploadPhoto(id){

  var file = document.getElementById("photo_"+id).files[0];

  if(!file){
    alert("Select photo");
    return;
  }

  var reader = new FileReader();

  reader.onload = function(){
    var base64 = reader.result.split(",")[1];

    fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        file: base64,
        id: id
      })
    })
    .then(res => res.json())
    .then(data => {

      if(data.status=="success"){
        alert("Uploaded");
        loadData(localStorage.getItem("mobile"));
      }else{
        alert("Failed");
      }

    });
  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
