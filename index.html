<!DOCTYPE html>
<html>
<head>
<title>HS Field App</title>

<style>
body { font-family: Arial; padding:20px; background:#f2f2f2; }
.box { background:white; padding:15px; margin:10px 0; border-radius:8px; }
button { padding:8px; background:green; color:white; border:none; }
input { padding:8px; margin:5px 0; width:200px; }
</style>

</head>

<body>

<h2>Health Space - Field App</h2>

<div id="loginDiv">
<input id="mobile" placeholder="Mobile Number"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="loginUser()">Login</button>
<p id="msg" style="color:red;"></p>
</div>

<div id="app" style="display:none;"></div>

<script>

var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPhibtGN39HcWIZaLIwGS3h9X6qLkVlDr9qTQ4QJIljcQ3IAEeMWCRlZS9x2apiPc/exec";

// ✅ LOGIN FUNCTION (FIXED NAME)
function loginUser(){

  var mobile = document.getElementById("mobile").value.trim();
  var pass = document.getElementById("pass").value;

  if(mobile === "" || pass === ""){
    document.getElementById("msg").innerText = "Enter details";
    return;
  }

  if(pass !== "1234"){
    document.getElementById("msg").innerText = "Wrong password";
    return;
  }

  loadData(mobile);
}

// 📋 LOAD DATA
function loadData(mobile){

  document.getElementById("msg").innerText = "Loading...";

  fetch(SCRIPT_URL + "?mobile=" + mobile)
  .then(res => res.json())
  .then(data => {

    document.getElementById("loginDiv").style.display="none";

    var html = "<h3>Today's Patients</h3>";

    if(!data || data.length === 0){
      html += "<p>No patients found</p>";
    }

    data.forEach(d=>{
      html += `
      <div class="box">
      <b>${d.name}</b><br>
      Time: ${d.time}<br>
      Address: ${d.address}<br>
      Test: ${d.test}<br>
      Tube: ${d.tube}<br>
      Amount: ₹${d.amount}<br><br>

      <input id="pay_${d.id}" placeholder="Payment"><br>
      <button onclick="submitPayment('${d.id}')">💰 Save Payment</button><br><br>

      📸 <input type="file" id="photo_${d.id}"><br>
      <button onclick="uploadPhoto('${d.id}')">Upload Photo</button>

      </div>`;
    });

    document.getElementById("app").innerHTML = html;
    document.getElementById("app").style.display="block";

  })
  .catch(err=>{
    document.getElementById("msg").innerText = "Error loading data";
    console.log(err);
  });
}

// 💰 PAYMENT
function submitPayment(id){

  var amt = document.getElementById("pay_"+id).value;

  if(amt === ""){
    alert("Enter amount");
    return;
  }

  fetch(`${SCRIPT_URL}?action=payment&id=${id}&payment=${amt}`)
  .then(res => res.text())
  .then(res => {
    alert("Payment Saved");
  });
}

// 📸 PHOTO UPLOAD
function uploadPhoto(file, patientId) {
  let formData = new FormData();
  formData.append("file", file);
  formData.append("id", patientId);

  fetch("YOUR_SCRIPT_URL", {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(response => {
    alert("✅ Photo Uploaded");

    // 🔥 IMPORTANT PART
    loadPatients();   // ← list refresh
  })
  .catch(err => {
    alert("❌ Upload Failed");
    console.log(err);
  });
}
if(patient.photoUrl){
  html += `<img src="${patient.photoUrl}" width="100"/>`;
}
document.getElementById("fileInput").value = "";
</script>

</body>
</html>
