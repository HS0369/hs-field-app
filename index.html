<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Field App</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  background: #2ecc71;
  color: #fff;
}

.logo {
  width: 50px;
}

/* LOGIN BOX */
.login-box {
  max-width: 320px;
  margin: 50px auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  text-align: center;
}

/* CARD LIST */
.card {
  background: #fff;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* INPUT + BUTTON */
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #27ae60;
  color: #fff;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>HS Field App</h2>

<div id="login" class="login-box">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Patients</h3>
  <div id="list"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

// LOGIN
function login() {

  var mobile = document.getElementById("mobile").value;

  fetch(API_URL + "?mobile=" + mobile)
  .then(res => res.text())
  .then(data => {
    console.log(data);

    var json = JSON.parse(data);

    if (json.length > 0) {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      render(json);
    } else {
      alert("No data");
    }
  })
  .catch(err => {
    console.log(err);
    alert("Error loading data");
  });
}
  
// RENDER
function render(data) {

  let html = "";

  data.forEach((row, index) => {

    let time = formatTime(row[2]);

    html += `
      <div class="card" onclick="openDetail(${index})">
        <div class="title">${row[1]}</div>
        <div class="sub">${time} | Tube: ${row[7]}</div>
      </div>
    `;
  });

  window.fullData = data;
  document.getElementById("list").innerHTML = html;
}
</script>
  <div id="detail" style="display:none;">
  <h3>Patient Details</h3>

  <div id="detailData"></div>

  <input id="payAmount" placeholder="Enter Payment">
  <button onclick="savePayment()">Save Payment</button>

  <br><br>

  <input type="file" id="photoFile">
  <button onclick="uploadPhoto()">Upload Photo</button>

  <br><br>
  <button onclick="goBack()">Back</button>
</div>
<script>
  function openDetail(index){

  let row = window.fullData[index];
  window.currentRowIndex = index;

  document.getElementById("app").style.display = "none";
  document.getElementById("detail").style.display = "block";

  document.getElementById("detailData").innerHTML = `
    <div class="card">
      <b>${row[1]}</b><br><br>
      🕒 Time: ${formatTime(row[2])}<br>
      📍 Address: ${row[3]}<br>
      🧪 Test: ${row[4]}<br>
      🧬 Tube: ${row[7]}<br>
      💰 Amount: ₹${row[8]}
    </div>
  `;
}
  function formatTime(dateStr){

  let d = new Date(dateStr);

  let hours = d.getHours();
  let minutes = d.getMinutes();

  let ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;

  minutes = minutes < 10 ? '0'+minutes : minutes;

  return hours + ':' + minutes + ' ' + ampm;
}
function goBack(){
  document.getElementById("detail").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function savePayment(){
  var amount = document.getElementById("payAmount").value;
  var rowIndex = window.currentRowIndex + 2;

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "payment",
      row: rowIndex,
      amount: amount
    })
  })
  .then(res => res.text())
  .then(r=>{
    if(r=="success") alert("Saved");
    else alert("Failed");
  });
}

function uploadPhoto(){
  var file = document.getElementById("photoFile").files[0];
  var reader = new FileReader();

  reader.onload = function(){
    var base64 = reader.result.split(",")[1];
    var rowIndex = window.currentRowIndex + 2;

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "upload",
        row: rowIndex,
        file: base64
      })
    })
    .then(res => res.text())
    .then(r=>{
      if(r=="success") alert("Uploaded");
      else alert("Failed");
    });
  };

  reader.readAsDataURL(file);
}
</script>
</body>
</html>
