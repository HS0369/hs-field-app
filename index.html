<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#fff;}

.login{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;
}

input,button{
width:90%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;
}

button{background:#1976d2;color:#fff;font-weight:bold;}

.header{
display:flex;align-items:center;
padding:10px;border-bottom:1px solid #ddd;
}

.header img{
width:50px;height:50px;border-radius:50%;margin-right:10px;
}

.card{
border:1px solid #eee;margin:10px;padding:10px;border-radius:8px;
}

.menu{
margin:10px;padding:15px;border:1px solid #ddd;border-radius:10px;
text-align:center;font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <img src="logo.png" width="80"><br>
  <b>Health Space</b>

  <input id="mobile" placeholder="Mobile">
  <input type="file" id="selfie" accept="image/*" capture="user">

  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

  <div class="header">
    <img id="userPhoto">
    <div>
      <b id="userName"></b><br>
      <small>Phlebotomist</small>
    </div>
  </div>

  <div class="menu" onclick="openPatients()">Patients</div>
  <div class="menu" onclick="openCollected()">Collected</div>
  <div class="menu">SOP</div>
  <div class="menu" onclick="logout()">Logout</div>

</div>

<!-- PATIENT LIST -->
<div id="patients" style="display:none">
  <h3 style="text-align:center">Patients</h3>
  <div id="list"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- COLLECTED -->
<div id="collected" style="display:none">
  <h3 style="text-align:center">Collected</h3>
  <div id="collectedList"></div>
  <button onclick="goDash()">Back</button>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none">
  <h3 style="text-align:center">Details</h3>

  <div id="detailBox"></div>

  <input id="pay" placeholder="Enter Amount">
  <button onclick="submitPayment()">Submit</button>

  <input type="file" id="photo">
  <button onclick="upload()">Upload Photo</button>

  <button onclick="backPatients()">Back</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzDHuowRFqr63Pxnm4Lk_DWjT3oUZIDBqAAYnyGf1qu_UqF8RILKn1qYmXAWIVm7jvH/exec";

let patients=[];
let collected=[];

// LOGIN
function login(){

let mob=document.getElementById("mobile").value;
let file=document.getElementById("selfie").files[0];

if(!file){alert("Selfie required");return;}

let reader=new FileReader();

reader.onload=function(){

let img=reader.result;
localStorage.setItem("photo",img);

fetch(API+"?mobile="+mob)
.then(r=>r.text())
.then(t=>{

let data=JSON.parse(t);

if(data.length==0){alert("No data");return;}

patients=data;

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("userPhoto").src=img;
document.getElementById("userName").innerText=data[0][6]; // column G

renderPatients();

});

};

reader.readAsDataURL(file);

}

// RENDER PATIENTS
function renderPatients(){

let html="";

patients.forEach((r,i)=>{

html+=`
<div class="card" onclick="openDetail(${i})">
📅 ${formatDate(r[1])}<br>
🕒 ${formatTime(r[2])}<br>
🧪 ${r[7]}<br>
💰 ₹${r[8]}
</div>
`;

});

document.getElementById("list").innerHTML=html;

}

// DETAIL
function openDetail(i){

window.index=i;

let r=patients[i];

document.getElementById("patients").style.display="none";
document.getElementById("detail").style.display="block";

document.getElementById("detailBox").innerHTML=`
<div class="card">
📅 ${formatDate(r[1])}<br>
🕒 ${formatTime(r[2])}<br>
🧪 ${r[7]}<br>
Total: ₹${r[8]}
</div>
`;

}

// SUBMIT
function submitPayment(){

let amt=Number(document.getElementById("pay").value);
let total=Number(patients[index][8]);

if(amt!==total){
alert("Collect full amount only");
return;
}

alert("Now upload photo");

}

// UPLOAD
function upload(){

let file=document.getElementById("photo").files[0];
if(!file){alert("Upload photo");return;}

let r=patients[index];

collected.push(r);

// remove from patient
patients.splice(index,1);

backPatients();

}

// NAV
function openPatients(){
hide();
document.getElementById("patients").style.display="block";
}

function openCollected(){
hide();

let html="";

collected.forEach(r=>{
html+=`<div class="card">${r[7]} ₹${r[8]}</div>`;
});

document.getElementById("collectedList").innerHTML=html;
document.getElementById("collected").style.display="block";
}

function goDash(){
hide();
document.getElementById("dashboard").style.display="block";
}

function backPatients(){
hide();
renderPatients();
document.getElementById("patients").style.display="block";
}

function hide(){
document.getElementById("dashboard").style.display="none";
document.getElementById("patients").style.display="none";
document.getElementById("detail").style.display="none";
document.getElementById("collected").style.display="none";
}

// DATE TIME
function formatDate(d){
let x=new Date(d);
return x.getDate()+"-"+(x.getMonth()+1)+"-"+x.getFullYear();
}

function formatTime(t){
let x=new Date(t);
return x.toLocaleTimeString();
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
